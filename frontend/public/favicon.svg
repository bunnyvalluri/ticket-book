<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070710"/>
      <stop offset="100%" stop-color="#140a28"/>
    </linearGradient>

    <!-- Border Glow Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Ticket Gradient -->
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe58f"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background Container -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="16" />

  <!-- Main Cinema Ticket with Notches -->
  <g transform="translate(48, 48) scale(13)">
    <path
      d="M5 8C5 6.89543 5.89543 6 7 6H25C26.1046 6 27 6.89543 27 8V12C25.3431 12 24 13.3431 24 15C24 16.6569 25.3431 18 27 18V24C27 25.1046 26.1046 26 25 26H7C5.89543 26 5 25.1046 5 24V18C6.65685 18 8 16.6569 8 15C8 13.3431 6.65685 12 5 12V8Z"
      fill="url(#ticketGrad)"
      fill-opacity="0.3"
      stroke="url(#ticketGrad)"
      stroke-width="2.2"
      stroke-linejoin="round"
    />

    <!-- Perforation Line -->
    <line
      x1="16"
      y1="7.5"
      x2="16"
      y2="24.5"
      stroke="url(#ticketGrad)"
      stroke-width="1.8"
      stroke-dasharray="2 2"
    />

    <!-- Play Icon Left -->
    <path
      d="M10.5 11.5L14 15L10.5 18.5V11.5Z"
      fill="url(#goldGrad)"
    />

    <!-- Gold Cinema Star Right -->
    <path
      d="M20.5 11.5L21.3 13.5L23.5 13.7L21.8 15.1L22.3 17.2L20.5 16.1L18.7 17.2L19.2 15.1L17.5 13.7L19.7 13.5L20.5 11.5Z"
      fill="url(#goldGrad)"
    />
  </g>
</svg>
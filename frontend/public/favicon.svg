<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1e"/>
      <stop offset="50%" stop-color="#070710"/>
      <stop offset="100%" stop-color="#140a28"/>
    </linearGradient>

    <!-- Border Glow Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Ticket Gradient -->
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Container -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="12" />

  <!-- Outer Glow Arc -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.3" stroke-dasharray="8 8" />

  <g filter="url(#glow)">
    <!-- Movie Ticket Stub (Angled) -->
    <g transform="translate(110, 110)">
      <!-- Main Ticket Shape -->
      <path d="M 40 40 
               L 252 40 
               A 24 24 0 0 1 276 64 
               L 276 216 
               A 24 24 0 0 1 252 240 
               L 40 240 
               A 24 24 0 0 1 16 216 
               L 16 64 
               A 24 24 0 0 1 40 40 Z" 
            fill="url(#ticketGrad)" opacity="0.95" />

      <!-- Left Notch -->
      <circle cx="16" cy="140" r="18" fill="#070710" />
      <!-- Right Notch -->
      <circle cx="276" cy="140" r="18" fill="#070710" />

      <!-- Dashed Cut Line -->
      <line x1="88" y1="52" x2="88" y2="228" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" />

      <!-- Ticket Details -->
      <!-- Star Icon -->
      <path d="M 180 80 L 187 95 L 204 97 L 191 109 L 195 125 L 180 117 L 165 125 L 169 109 L 156 97 L 173 95 Z" fill="url(#goldGrad)" />

      <!-- Text Lines -->
      <rect x="120" y="148" width="120" height="12" rx="6" fill="#ffffff" opacity="0.9" />
      <rect x="135" y="172" width="90" height="10" rx="5" fill="#ffffff" opacity="0.6" />
      <rect x="150" y="194" width="60" height="8" rx="4" fill="url(#goldGrad)" opacity="0.9" />
    </g>

    <!-- Popcorn Tub in Foreground -->
    <g transform="translate(195, 185)">
      <!-- Popcorn Kernels (Top Glow) -->
      <circle cx="50" cy="55" r="22" fill="#fef08a" />
      <circle cx="80" cy="45" r="26" fill="#fde047" />
      <circle cx="115" cy="52" r="24" fill="#fef08a" />
      <circle cx="65" cy="35" r="20" fill="#ffffff" />
      <circle cx="98" cy="32" r="22" fill="#fef08a" />

      <!-- Tub Container Base -->
      <path d="M 35 75 L 130 75 L 118 215 L 47 215 Z" fill="#dc2626" />

      <!-- Tub Stripes -->
      <path d="M 52 75 L 68 75 L 62 215 L 47 215 Z" fill="#ffffff" />
      <path d="M 82 75 L 98 75 L 92 215 L 77 215 Z" fill="#ffffff" />
      <path d="M 112 75 L 128 75 L 118 215 L 105 215 Z" fill="#ffffff" />

      <!-- Tub Rim -->
      <rect x="30" y="70" width="105" height="12" rx="6" fill="#facc15" stroke="#ca8a04" stroke-width="2" />
    </g>

    <!-- Sparkle Stars -->
    <path d="M 370 120 L 374 132 L 386 136 L 374 140 L 370 152 L 366 140 L 354 136 L 366 132 Z" fill="url(#goldGrad)" />
    <path d="M 110 350 L 113 359 L 122 362 L 113 365 L 110 374 L 107 365 L 98 362 L 107 359 Z" fill="#a78bfa" />
  </g>
</svg>